openapi: 3.1.0
info:
  title: Medical Courses Website API
  version: 0.1.0
servers:
  - url: /api
paths:
  /health:
    get:
      summary: API health check
      responses:
        '200':
          description: API is available
  /home:
    get:
      summary: Website home summaries
      responses:
        '200':
          description: Latest published courses, books, and articles
  /categories:
    get:
      summary: Public active categories
      responses:
        '200':
          description: Paginated category collection
  /courses:
    get:
      summary: Public published course catalog
      responses:
        '200':
          description: Paginated course collection
  /courses/{slug}:
    get:
      summary: Public published course details
      responses:
        '200':
          description: Course details with public sections and lesson metadata
        '404':
          description: Course is not found or is not published
  /books:
    get:
      summary: Public published book catalog
      responses:
        '200':
          description: Paginated book collection
  /books/{slug}:
    get:
      summary: Public published book details
      responses:
        '200':
          description: Book details without protected file links
        '404':
          description: Book is not found or is not published
  /articles:
    get:
      summary: Public published article catalog
      responses:
        '200':
          description: Paginated article collection
  /articles/{slug}:
    get:
      summary: Public published article details
      responses:
        '200':
          description: Article details
        '404':
          description: Article is not found or is not published
  /auth/register:
    post:
      summary: Register a student account
      responses:
        '201':
          description: Student account created
        '422':
          description: Validation error
  /auth/login:
    post:
      summary: Login and return current user plus access token
      responses:
        '200':
          description: User logged in
        '422':
          description: Invalid credentials or validation error
  /auth/logout:
    post:
      summary: Logout current user
      security:
        - sanctum: []
      responses:
        '200':
          description: User logged out
        '401':
          description: Guest user is not authenticated
  /auth/forgot-password:
    post:
      summary: Send password reset link
      responses:
        '200':
          description: Reset link flow accepted
        '422':
          description: Validation error
  /auth/reset-password:
    post:
      summary: Reset password using token
      responses:
        '200':
          description: Password reset successful
        '422':
          description: Invalid token or validation error
  /me:
    get:
      summary: Current authenticated user
      security:
        - sanctum: []
      responses:
        '200':
          description: Current user response
        '401':
          description: Guest user is not authenticated
    patch:
      summary: Update current authenticated user profile
      security:
        - sanctum: []
      responses:
        '200':
          description: User profile updated
        '401':
          description: Guest user is not authenticated
        '422':
          description: Validation error
  /my/library:
    get:
      summary: Current user purchased course and book library
      security:
        - sanctum: []
      responses:
        '200':
          description: Purchased courses and books
        '401':
          description: Guest user is not authenticated
  /my/courses/{course}/lessons/{lesson}:
    get:
      summary: Protected purchased lesson access
      security:
        - sanctum: []
      responses:
        '200':
          description: Protected lesson content
        '401':
          description: Guest user is not authenticated
        '403':
          description: Current user has not purchased the course
        '404':
          description: Lesson is not found, not published, or mismatched
  /my/books/{book}/access:
    get:
      summary: Protected purchased book file access
      security:
        - sanctum: []
      responses:
        '200':
          description: Protected book access URL
        '401':
          description: Guest user is not authenticated
        '403':
          description: Current user has not purchased the book
        '404':
          description: Book file is not available
  /admin/health:
    get:
      summary: Admin route health check
      security:
        - sanctum: []
      responses:
        '200':
          description: Admin user is authorized
        '401':
          description: Guest user is not authenticated
        '403':
          description: Authenticated user is not an admin
components:
  schemas:
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
    UserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        userType:
          type: string
          enum: [student, admin]
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer

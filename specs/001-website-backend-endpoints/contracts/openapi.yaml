openapi: 3.1.0
info:
  title: Medical Courses Website API
  version: 0.1.0
servers:
  - url: /api
paths:
  /health:
    get:
      summary: API health check
      responses:
        '200':
          description: API is available
  /auth/register:
    post:
      summary: Register a student account
      responses:
        '201':
          description: Student account created
        '422':
          description: Validation error
  /auth/login:
    post:
      summary: Login and return current user plus access token
      responses:
        '200':
          description: User logged in
        '422':
          description: Invalid credentials or validation error
  /auth/logout:
    post:
      summary: Logout current user
      security:
        - sanctum: []
      responses:
        '200':
          description: User logged out
        '401':
          description: Guest user is not authenticated
  /auth/forgot-password:
    post:
      summary: Send password reset link
      responses:
        '200':
          description: Reset link flow accepted
        '422':
          description: Validation error
  /auth/reset-password:
    post:
      summary: Reset password using token
      responses:
        '200':
          description: Password reset successful
        '422':
          description: Invalid token or validation error
  /me:
    get:
      summary: Current authenticated user
      security:
        - sanctum: []
      responses:
        '200':
          description: Current user response
        '401':
          description: Guest user is not authenticated
    patch:
      summary: Update current authenticated user profile
      security:
        - sanctum: []
      responses:
        '200':
          description: User profile updated
        '401':
          description: Guest user is not authenticated
        '422':
          description: Validation error
  /admin/health:
    get:
      summary: Admin route health check
      security:
        - sanctum: []
      responses:
        '200':
          description: Admin user is authorized
        '401':
          description: Guest user is not authenticated
        '403':
          description: Authenticated user is not an admin
components:
  schemas:
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
    UserResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        userType:
          type: string
          enum: [student, admin]
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer

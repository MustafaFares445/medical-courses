name: Validate backend

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_mysql, bcmath, fileinfo

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: composer update --no-interaction --prefer-dist --no-progress --optimize-autoloader > composer.log 2>&1

      - name: Prepare environment
        id: prepare
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          cp .env.example .env
          php artisan key:generate > prepare.log 2>&1

      - name: Check changed-file formatting
        id: format
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: >-
          vendor/bin/pint --test
          app/Http/Requests/Admin/BookRequest.php
          app/Http/Requests/Admin/CourseRequest.php
          app/Http/Resources/LibraryBookResource.php
          app/Http/Resources/PurchasedCourseResource.php
          database/migrations/2026_07_12_000001_normalize_catalog_currencies.php
          > pint.log 2>&1

      - name: Run migrations
        id: migrations
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        env: &mysql-env
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate:fresh --force > migrations.log 2>&1

      - name: Run tests
        id: tests
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        env: *mysql-env
        run: composer test > tests.log 2>&1

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-validation-logs
          path: |
            composer.log
            prepare.log
            pint.log
            migrations.log
            tests.log
          if-no-files-found: ignore

      - name: Fail when validation failed
        if: always()
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.prepare.outcome }}" = "success"
          test "${{ steps.format.outcome }}" = "success"
          test "${{ steps.migrations.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"

name: Validate backend

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, fileinfo

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: composer install --no-interaction --prefer-dist --optimize-autoloader > composer.log 2>&1

      - name: Prepare environment
        id: prepare
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate > prepare.log 2>&1

      - name: Check formatting
        id: format
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: vendor/bin/pint --test > pint.log 2>&1

      - name: Run migrations
        id: migrations
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force > migrations.log 2>&1

      - name: Run tests
        id: tests
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: composer test > tests.log 2>&1

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-validation-logs
          path: |
            composer.log
            prepare.log
            pint.log
            migrations.log
            tests.log
          if-no-files-found: ignore

      - name: Fail when validation failed
        if: always()
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.prepare.outcome }}" = "success"
          test "${{ steps.format.outcome }}" = "success"
          test "${{ steps.migrations.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
